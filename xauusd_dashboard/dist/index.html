  <body class="bg-surface text-text-primary">
    <div id="fallback" style="color:#f59e0b;background:#1a1a2e;padding:16px;font-family:sans-serif;font-size:16px;font-weight:bold;border-bottom:2px solid #f59e0b;">
      ⏳ XAUUSD Dashboard — initializing...
    </div>
    <div id="root" style="min-height:100vh"></div>
    <script>
      // Remove fallback once React mounts (root gets children)
      new MutationObserver(() => {
        var r = document.getElementById('root');
        if (r && r.children.length > 0) {
          var f = document.getElementById('fallback');
          if (f) { f.textContent = '✅ Dashboard loaded'; f.style.color = '#22c55e'; f.style.borderColor = '#22c55e'; }
        }
      }).observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
